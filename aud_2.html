<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ISKCON Divine Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- SETTINGS --- */
            --art-size: 280px; 

            /* --- THEME COLORS --- */
            --bg-light: #FFF8E1;
            --card-light: rgba(255, 255, 255, 0.85);
            --text-light: #4E342E;
            --accent-light: #FF9933;
            
            --bg-dark: #1A0500;
            --card-dark: rgba(40, 10, 5, 0.85);
            --text-dark: #FFE0B2;
            --accent-dark: #FFD54F;

            /* DEFAULT IS LIGHT */
            --bg: var(--bg-light);
            --card: var(--card-light);
            --text: var(--text-light);
            --accent: var(--accent-light);
        }

        [data-theme="dark"] {
            --bg: var(--bg-dark);
            --card: var(--card-dark);
            --text: var(--text-dark);
            --accent: var(--accent-dark);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 10%, rgba(255, 153, 51, 0.3), transparent 70%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
            user-select: none;
        }

        /* --- FLOWER RAIN --- */
        #flower-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; overflow: hidden;
        }
        .flower {
            position: absolute; top: -50px; font-size: 20px; opacity: 0.8;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* --- MAIN CARD --- */
        .player-card {
            width: 90%; max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 5;
            transition: all 0.5s ease;
        }

        /* --- TOP BAR --- */
        .top-bar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .app-name { font-size: 0.85rem; letter-spacing: 1.5px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        
        .theme-btn {
            background: rgba(0,0,0,0.05); border: none; border-radius: 50%;
            width: 38px; height: 38px; cursor: pointer; color: var(--text);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s;
        }
        .theme-btn:active { transform: scale(0.9); }
        .theme-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- ALBUM ART --- */
        .art-wrapper {
            width: var(--art-size); height: var(--art-size);
            perspective: 800px; margin-bottom: 25px;
        }

        .art-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            border-radius: 15px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            background: #000;
        }

        .art-inner img {
            width: 100%; height: 100%;
            object-fit: contain; 
            border-radius: 15px; 
            display: block;
        }
        
        .art-inner::after {
            content: ''; position: absolute; inset: 0;
            border-radius: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            pointer-events: none;
        }

        /* 3D SWING ANIMATION (Playing) */
        .playing .art-inner { animation: divineSwing 5s ease-in-out infinite; }

        @keyframes divineSwing {
            0% { transform: rotateY(-3deg); }
            50% { transform: rotateY(3deg); }
            100% { transform: rotateY(-3deg); }
        }

        /* --- INFO --- */
        .info { text-align: center; width: 100%; margin-bottom: 15px; }
        .info h2 {
            font-family: 'Cinzel', serif; color: var(--text);
            font-size: 1.5rem; margin-bottom: 5px; font-weight: 700;
            line-height: 1.2;
        }
        .info p {
            color: var(--accent); font-size: 0.9rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* --- PROGRESS BAR --- */
        .progress-area { width: 100%; margin: 15px 0 25px 0; padding: 0 5px; }
        .progress-bg {
            width: 100%; height: 6px; background: rgba(0,0,0,0.1);
            border-radius: 10px; cursor: pointer; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent), #FFB74D);
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .timers {
            display: flex; justify-content: space-between; font-size: 0.75rem;
            color: var(--text); margin-top: 8px; opacity: 0.8; font-weight: 500;
        }

        /* --- CONTROLS --- */
        .controls { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn {
            background: none; border: none; cursor: pointer; color: var(--text);
            padding: 10px; transition: 0.2s; opacity: 0.8;
        }
        .btn:active { transform: scale(0.9); opacity: 1; }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        /* Play Button */
        .play-btn {
            width: 70px; height: 70px;
            background: var(--accent);
            border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 153, 51, 0.4);
            transition: transform 0.2s, background 0.3s;
            cursor: pointer;
            border: none;
        }
        .play-btn:active { transform: scale(0.95); }
        .play-btn svg { width: 30px; height: 30px; fill: #fff; }

    </style>
</head>
<body>

    <!-- Flowers fall here -->
    <div id="flower-container"></div>

    <div class="player-card">
        
        <!-- Header -->
        <div class="top-bar">
            <span class="app-name">ISKCON Hadapsar</span>
            <button class="theme-btn" id="theme-toggle" aria-label="Toggle Theme">
                <svg id="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.41 1.41c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.41 1.41c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.41-1.41zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.41 1.41c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.41-1.41zM7.05 18.36a.996.996 0 000 1.41.996.996 0 001.41 0l1.41-1.41c.39-.39.39-1.03 0-1.41a.996.996 0 00-1.41 0l-1.41 1.41z"></path></svg>
                <svg id="moon-icon" viewBox="0 0 24 24" style="display:none;"><path d="M9.37 5.51A7.35 7.35 0 009.1 7.5c0 4.08 3.32 7.4 7.4 7.4.68 0 1.35-.09 1.99-.27A7.014 7.014 0 0112 19c-3.86 0-7-3.14-7-7 0-2.93 1.81-5.45 4.37-6.49zM12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"></path></svg>
            </button>
        </div>

        <!-- Image Section -->
        <div class="art-wrapper">
            <div class="art-inner">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgQRuE7cczvQqNxHxu2fc4P3a6q8kuOOuXjsD8B-M5-Bm35pvCooNOx_Gn-EqGq8Qx-O-T4Ed8VzCJiVVmdxiQkYDZbSKNA-sggqSKoeEocBQP9X7PM5rspelhBhQoSSMoGrDzLvoHyWJm9g6zP9km-KKLc-xYMK_UcOrXIpKkQ_fYR-QQQg2Q0QIPoO1o/s1280/maxresdefault%20(1).jpg" alt="Narshimha Arti">
            </div>
        </div>

        <!-- Info -->
        <div class="info">
            <h2>Narshimha Arti</h2>
            <p>ISKCON HADAPSAR</p>
        </div>

        <!-- Progress -->
        <div class="progress-area">
            <div class="progress-bg" id="progress-box">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="timers">
                <span id="curr-time">00:00</span>
                <span id="dur-time">00:00</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn" id="loop-btn" aria-label="Loop"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path></svg></button>
            <button class="btn" id="prev-btn" aria-label="Previous 10s"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"></path></svg></button>
            
            <button class="play-btn" id="play-btn" aria-label="Play or Pause">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
            </button>

            <button class="btn" id="next-btn" aria-label="Next 10s"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"></path></svg></button>
            <button class="btn" id="replay-btn" aria-label="Restart"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"></path></svg></button>
        </div>
    </div>

    <!-- LOCAL FILE LINK (For GitHub) -->
    <audio id="audio" src="chant.mp3"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const progressBox = document.getElementById('progress-box');
        const progressFill = document.getElementById('progress-fill');
        const currTime = document.getElementById('curr-time');
        const durTime = document.getElementById('dur-time');
        const flowerContainer = document.getElementById('flower-container');
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        
        let isPlaying = false;
        let isLoop = false;
        let flowerInterval;

        // FLOWER RAIN LOGIC
        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = '🌸';
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 3 + 's';
            flower.style.fontSize = Math.random() * 10 + 15 + 'px';
            flowerContainer.appendChild(flower);
            setTimeout(() => { flower.remove(); }, 6000);
        }

        function startFlowers() { if(!flowerInterval) flowerInterval = setInterval(createFlower, 400); }
        function stopFlowers() { clearInterval(flowerInterval); flowerInterval = null; setTimeout(() => { flowerContainer.innerHTML = ''; }, 2000); }

        // PLAY / PAUSE LOGIC
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                iconPlay.style.display = 'block'; 
                iconPause.style.display = 'none';
                document.body.classList.remove('playing');
                stopFlowers();
            } else {
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        iconPlay.style.display = 'none'; 
                        iconPause.style.display = 'block';
                        document.body.classList.add('playing');
                        startFlowers();
                    })
                    .catch(error => {
                        console.log("Playback prevented:", error);
                    });
                }
            }
            isPlaying = !isPlaying;
        });

        // THEME TOGGLE
        let isDark = false;
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            if(isDark) {
                document.body.setAttribute('data-theme', 'dark');
                sunIcon.style.display = 'none'; moonIcon.style.display = 'block';
            } else {
                document.body.setAttribute('data-theme', 'light');
                sunIcon.style.display = 'block'; moonIcon.style.display = 'none';
            }
        });

        // TIME FORMATTER
        function formatTime(t) {
            if (isNaN(t)) return "00:00";
            const m = Math.floor(t / 60);
            const s = Math.floor(t % 60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }

        // CONTROLS & PROGRESS
        audio.addEventListener('timeupdate', (e) => {
            const duration = e.target.duration;
            const currentTime = e.target.currentTime;
            
            if(duration > 0) {
                progressFill.style.width = `${(currentTime / duration) * 100}%`;
                currTime.innerText = formatTime(currentTime);
                durTime.innerText = formatTime(duration);
            }
        });

        progressBox.addEventListener('click', (e) => {
            const width = progressBox.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        });

        // SKIP BUTTONS
        document.getElementById('prev-btn').addEventListener('click', () => {
            if(audio.currentTime > 10) audio.currentTime -= 10;
            else audio.currentTime = 0;
        });
        
        document.getElementById('next-btn').addEventListener('click', () => {
            if(audio.duration && audio.currentTime < audio.duration - 10) audio.currentTime += 10;
        });

        // REPLAY BUTTON
        document.getElementById('replay-btn').addEventListener('click', () => { 
            audio.currentTime = 0; 
            if(!isPlaying) playBtn.click(); 
        });

        // LOOP BUTTON
        document.getElementById('loop-btn').addEventListener('click', function() { 
            isLoop = !isLoop; 
            this.style.opacity = isLoop ? '1' : '0.7'; 
            this.style.color = isLoop ? 'var(--accent)' : 'var(--text)'; 
        });

        // WHEN AUDIO ENDS
        audio.addEventListener('ended', () => {
            if(isLoop) { 
                audio.currentTime = 0; 
                audio.play(); 
            } else { 
                isPlaying = false; 
                iconPlay.style.display = 'block'; 
                iconPause.style.display = 'none'; 
                document.body.classList.remove('playing'); 
                progressFill.style.width = '0%'; 
                audio.currentTime = 0; 
                stopFlowers(); 
            }
        });

        // LOAD DURATION
        audio.addEventListener('loadedmetadata', () => {
            durTime.innerText = formatTime(audio.duration);
        });

    </script>
</body>
</html>
