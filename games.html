<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Krishna Memory Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
<style>
    /* --- THEME: VAIKUNTHA BLUE & GOLD --- */
    :root { 
        --primary: #0277BD; 
        --accent: #FFD700; 
        --bg-grad: linear-gradient(135deg, #E1F5FE 0%, #B3E5FC 100%);
        --card-back: #01579B;
    }

    body {
        background: var(--bg-grad);
        font-family: 'Fredoka', sans-serif;
        margin: 0;
        height: 100vh;
        display: flex; flex-direction: column;
        user-select: none;
    }

    /* HEADER */
    .top-bar {
        padding: 15px;
        background: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        display: flex; justify-content: space-between; align-items: center;
        border-radius: 0 0 20px 20px;
        z-index: 10;
    }
    .back-btn {
        background: #E0F7FA; border: none; padding: 8px 15px; 
        border-radius: 20px; color: var(--primary); font-weight: bold;
        font-size: 16px; cursor: pointer;
        transition: 0.2s;
    }
    .back-btn:active {
        transform: scale(0.9);
    }
    .level-badge {
        background: var(--primary); color: white; padding: 5px 15px;
        border-radius: 15px; font-size: 14px;
    }

    /* SCREENS */
    .screen { position: absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; padding-top: 70px; }
    .screen.active { display: flex; }

    /* LEVEL MAP (HOME) */
    .map-container {
        flex: 1; overflow-y: auto; padding: 20px; text-align: center;
    }
    .lvl-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        max-width: 400px; margin: 0 auto;
    }
    .lvl-btn {
        aspect-ratio: 1; background: white; border-radius: 15px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; font-weight: bold; color: var(--primary);
        box-shadow: 0 5px 0 #cfd8dc; border: 2px solid white;
        cursor: pointer; position: relative; transition: 0.2s;
    }
    .lvl-btn:active { transform: translateY(4px); box-shadow: none; }
    .lvl-btn.locked { background: #ECEFF1; color: #B0BEC5; box-shadow: none; pointer-events: none; }
    .lvl-btn.completed { background: #C8E6C9; color: #2E7D32; border-color: #4CAF50; }

    /* GAME BOARD */
    .game-board {
        flex: 1; display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }
    .grid {
        display: grid; gap: 10px; width: 100%; max-width: 450px;
        perspective: 1000px;
    }

    /* CARD STYLES */
    .card {
        background: transparent; aspect-ratio: 1; cursor: pointer;
        position: relative; transform-style: preserve-3d; transition: transform 0.5s;
    }
    .card.flip { transform: rotateY(180deg); }
    
    .front, .back {
        position: absolute; width: 100%; height: 100%;
        backface-visibility: hidden; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .front { background: var(--card-back); border: 2px solid white; }
    .front::after { content: '🕉️'; font-size: 24px; color: rgba(255,255,255,0.5); }
    
    .back { background: white; transform: rotateY(180deg); }
    .back img { width: 80%; height: 80%; object-fit: contain; }

    /* KNOWLEDGE TOAST (INFO BAR) */
    .info-bar {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #37474F; color: #FFD700; padding: 12px 25px;
        border-radius: 30px; font-size: 14px; text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        display: none; width: 90%; max-width: 400px; z-index: 100;
        animation: slideUp 0.3s;
    }
    @keyframes slideUp { from{transform:translate(-50%, 20px); opacity:0;} to{transform:translate(-50%, 0); opacity:1;} }

    /* WIN MODAL */
    .modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-box {
        background: white; padding: 30px; border-radius: 25px; text-align: center;
        width: 85%; max-width: 350px; animation: pop 0.3s; border-top: 10px solid var(--primary);
    }
    .btn-main {
        background: var(--primary); color: white; border: none;
        padding: 12px 30px; border-radius: 30px; font-size: 18px; margin-top: 15px;
        width: 100%; font-weight: bold; cursor: pointer;
    }
    @keyframes pop { from{transform:scale(0.8)} to{transform:scale(1)} }

</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
    <button class="back-btn" onclick="handleBack()"><i class="fas fa-arrow-left"></i> BACK</button>
    <div style="font-weight:bold; color:#01579B;" id="headerTitle">LEVELS</div>
    <div id="moveCounter" style="display:none; color:#555;">Moves: 0</div>
</div>

<!-- SCREEN 1: LEVEL SELECT -->
<div id="scr-levels" class="screen active">
    <div class="map-container">
        <h2 style="color:#0277BD; margin-bottom:5px;">Krishna Leela</h2>
        <p style="color:#666; font-size:14px; margin-bottom:20px;">Complete levels to unlock spiritual knowledge!</p>
        <div class="lvl-grid" id="levelGrid"></div>
    </div>
</div>

<!-- SCREEN 2: GAME BOARD -->
<div id="scr-game" class="screen">
    <div class="game-board">
        <div class="grid" id="gameGrid"></div>
    </div>
</div>

<!-- KNOWLEDGE TOAST -->
<div id="infoToast" class="info-bar"></div>

<!-- WIN MODAL -->
<div id="winModal" class="modal">
    <div class="modal-box">
        <div style="font-size:50px;">🦚</div>
        <h2 style="color:#2E7D32; margin:10px 0;">Hari Bol!</h2>
        <p style="color:#555;">Level Completed!</p>
        <button class="btn-main" onclick="nextLevel()">Next Level ➜</button>
        <button onclick="toHome()" style="background:none; border:none; color:#777; margin-top:10px; text-decoration:underline; font-size:16px; cursor:pointer;">Menu</button>
    </div>
</div>

<script>
    // --- 1. IMAGE DATABASE (Adhyatmic Gyan) ---
    const assets =[
        { id: 1, name: "Flute (Bansuri)", info: "Krishna calls the Gopis & Cows with His flute.", img: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEikIvmniPW_YIzmeiF5bQsXSOpGAWUVOtqDxtbr3oAef3ilIAubftExrlLrdlVHOI1OtbFuKf4obdYxbShSLcG-5pPETy7IUTpuukg6a736XhbmHWBankopDocDKopzkqSiuQoUPwPsc-4DV682vHR62snRG3QsnOOjEb3jedOhGa8AP7Mhi7g0jdIqfW5f/s500/1000139926.png" },
        { id: 2, name: "Peacock Feather", info: "Krishna wears this to show nature's beauty.", img: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj7S9M-cPzrYXVzV3r4rGiNrEni9GDSXCEOZ0AZUAHlKwQWsJ9yMPLufTEC6Su3inB3OL-D3IxU3fGceVGnXovn5jrIQun0y2BX6tW5znBFJUtGhOx79jJz9PkA4_0olFYqT7X-lfofuVmiTDCS3fj3ZFi70yk8wyiGooP1_y8LpbpuN0ilpqrDG21fmrtl/s500/1000139937.png" },
        { id: 3, name: "Butter Pot", info: "Makhan Chor loves butter (our pure hearts).", img: "https://cdn-icons-png.flaticon.com/512/9713/9713504.png" },
        { id: 4, name: "Cow (Gau Mata)", info: "Krishna is 'Gopala', the protector of cows.", img: "https://cdn-icons-png.flaticon.com/512/1998/1998610.png" },
        { id: 5, name: "Lotus Feet", info: "Devotees meditate on Krishna's Lotus Feet.", img: "https://cdn-icons-png.flaticon.com/512/3655/3655562.png" }, 
        { id: 6, name: "Sudarshan Chakra", info: "Vishnu's weapon to protect devotees.", img: "https://cdn-icons-png.flaticon.com/512/1169/1169936.png" },
        { id: 7, name: "Conch (Shankh)", info: "Blown to announce victory of Dharma.", img: "https://cdn-icons-png.flaticon.com/512/3229/3229864.png" },
        { id: 8, name: "Tilak", info: "Marks the body as a temple of God.", img: "https://cdn-icons-png.flaticon.com/512/7508/7508775.png" },
        { id: 9, name: "Mridanga", info: "Used in Kirtan to please Lord Chaitanya.", img: "https://cdn-icons-png.flaticon.com/512/9079/9079770.png" },
        { id: 10, name: "Tulsi Devi", info: "Very dear to Krishna. Bhakti grows by serving her.", img: "https://cdn-icons-png.flaticon.com/512/4323/4323979.png" }
    ];

    // --- 2. LEVEL CONFIGURATION ---
    const levels =[
        { lvl: 1, cols: 2, pairs: 2 }, // 4 Cards
        { lvl: 2, cols: 2, pairs: 3 }, // 6 Cards
        { lvl: 3, cols: 3, pairs: 3 }, // 6 Cards
        { lvl: 4, cols: 3, pairs: 4 }, // 8 Cards
        { lvl: 5, cols: 3, pairs: 4 },
        { lvl: 6, cols: 3, pairs: 6 }, // 12 Cards
        { lvl: 7, cols: 3, pairs: 6 },
        { lvl: 8, cols: 4, pairs: 6 }, // 12 Cards
        { lvl: 9, cols: 4, pairs: 8 }, // 16 Cards
        { lvl: 10, cols: 4, pairs: 8 },
        { lvl: 11, cols: 4, pairs: 8 },
        { lvl: 12, cols: 4, pairs: 10 }, // 20 Cards
        { lvl: 13, cols: 4, pairs: 10 },
        { lvl: 14, cols: 5, pairs: 10 },
        { lvl: 15, cols: 5, pairs: 10 }
    ];

    // State Variables
    let currentLevel = 1;
    let unlockedLevel = parseInt(localStorage.getItem('kmg_unlocked')) || 1;
    let gameCards =[];
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let matchedPairs = 0;
    let moves = 0;

    // --- 3. INIT & MENU ---
    function init() {
        renderLevels();
    }

    function renderLevels() {
        const grid = document.getElementById('levelGrid');
        grid.innerHTML = '';
        
        levels.forEach(l => {
            let btn = document.createElement('div');
            btn.className = `lvl-btn ${l.lvl > unlockedLevel ? 'locked' : ''} ${l.lvl < unlockedLevel ? 'completed' : ''}`;
            
            if (l.lvl > unlockedLevel) {
                btn.innerText = "🔒";
            } else {
                btn.innerText = l.lvl;
                btn.onclick = () => startGame(l.lvl);
            }
            grid.appendChild(btn);
        });
    }

    // --- 4. GAME LOGIC ---
    function startGame(lvlNum) {
        currentLevel = lvlNum;
        const config = levels[lvlNum - 1];
        
        // Switch Screens
        document.getElementById('scr-levels').classList.remove('active');
        document.getElementById('scr-game').classList.add('active');
        document.getElementById('headerTitle').innerText = "LEVEL " + lvlNum;
        document.getElementById('moveCounter').style.display = "block";
        document.getElementById('moveCounter').innerText = "Moves: 0";
        
        // Prepare Deck
        let selectedAssets =[];
        for(let i=0; i<config.pairs; i++) {
            selectedAssets.push(assets[i % assets.length]);
        }
        
        // Double them
        gameCards =[...selectedAssets, ...selectedAssets];
        // Shuffle
        gameCards.sort(() => 0.5 - Math.random());

        // Render Grid
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
        
        // Reset Logic
        moves = 0;
        matchedPairs = 0;
        
        gameCards.forEach(item => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.name = item.name;
            card.dataset.info = item.info;

            card.innerHTML = `
                <div class="front"></div>
                <div class="back"><img src="${item.img}"></div>
            `;
            
            card.onclick = function() { flipCard(this); };
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (lockBoard) return;
        if (card === firstCard) return;
        if (card.classList.contains('flip')) return; // Already matched/flipped

        card.classList.add('flip');

        if (!hasFlippedCard) {
            hasFlippedCard = true;
            firstCard = card;
            return;
        }

        secondCard = card;
        moves++;
        document.getElementById('moveCounter').innerText = "Moves: " + moves;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.name === secondCard.dataset.name;

        if (isMatch) {
            disableCards();
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        // Show Toast
        showToast(`✨ ${firstCard.dataset.name}: ${firstCard.dataset.info}`);
        
        firstCard.onclick = null;
        secondCard.onclick = null;
        
        matchedPairs++;
        resetBoard();

        // Check Win
        if (matchedPairs === levels[currentLevel - 1].pairs) {
            setTimeout(() => {
                document.getElementById('winModal').style.display = 'flex';
                // Unlock next level
                if (currentLevel === unlockedLevel && currentLevel < levels.length) {
                    unlockedLevel++;
                    localStorage.setItem('kmg_unlocked', unlockedLevel);
                }
            }, 800);
        }
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {[hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] =[null, null];
    }

    // --- 5. UTILS ---
    function showToast(msg) {
        const t = document.getElementById('infoToast');
        t.innerText = msg;
        t.style.display = 'block';
        
        // Hide after 3 seconds
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function handleBack() {
        // If in game, go to map. If in map, go to App Home Hub.
        if(document.getElementById('scr-game').classList.contains('active')) {
            toHome();
        } else {
            // Web Safe Back Navigation to Hub
            window.location.href = "stories-games.html"; 
        }
    }

    function toHome() {
        document.getElementById('scr-game').classList.remove('active');
        document.getElementById('scr-levels').classList.add('active');
        document.getElementById('headerTitle').innerText = "LEVELS";
        document.getElementById('moveCounter').style.display = "none";
        document.getElementById('winModal').style.display = 'none';
        renderLevels(); // Re-render to update locks
    }

    function nextLevel() {
        if(currentLevel < levels.length) {
            document.getElementById('winModal').style.display = 'none';
            startGame(currentLevel + 1);
        } else {
            alert("All Levels Completed! You are a master!");
            toHome();
        }
    }

    // Initialize
    init();

</script>
<!-- FontAwesome for Back Icon -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
</body>
</html>
