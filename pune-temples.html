<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF9933">
    <meta name="description" content="Official ISKCON Pune Directory & Darshan Gallery">
    <title>ISKCON Pune Temples</title>

    <!-- Google Fonts: 'Playfair Display' (Spiritual) & 'Inter' (Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 
           ========================================
           1. CORE THEME & RESET 
           ========================================
        */
        :root {
            --primary: #FF9933;         
            --primary-dark: #D35400;    
            --secondary: #4E342E;       
            --bg-body: #FFF8F0;         
            --bg-surface: rgba(255, 255, 255, 0.95);      
            --text-main: #2D2D2D;
            --text-light: #666666;
            --radius-lg: 20px;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.06);
            --shadow-float: 0 15px 35px rgba(255, 153, 51, 0.25);
            --transition-speed: 0.3s;
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.dark-mode {
            --bg-body: #0F0F0F;
            --bg-surface: rgba(30, 30, 30, 0.95);
            --text-main: #F5F5F5;
            --text-light: #A0A0A0;
            --secondary: #FFB74D;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.6);
            --shadow-float: 0 15px 35px rgba(255, 153, 51, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 90px; 
            overflow-x: hidden;
            user-select: none; /* Prevents text highlighting on rapid tapping */
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* 
           ========================================
           2. HEADER AREA (GLASSMORPHISM)
           ========================================
        */
        header {
            background: var(--bg-surface);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 800;
            padding: 15px 15px 20px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
            animation: slideDownHeader 0.6s var(--spring-easing) forwards;
            transform: translateY(-100%);
            border-bottom: 1px solid rgba(255, 153, 51, 0.1);
        }

        @keyframes slideDownHeader { to { transform: translateY(0); } }

        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        /* Buttons */
        .btn-nav-back, .btn-action-icon {
            background: #FFF3E0; color: var(--primary-dark);
            border: none; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
            transition: 0.2s var(--spring-easing);
            box-shadow: 0 4px 10px rgba(255,153,51,0.2);
            position: relative; overflow: hidden;
        }
        body.dark-mode .btn-nav-back, body.dark-mode .btn-action-icon {
            background: #2A2A2A; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-nav-back:active, .btn-action-icon:active { transform: scale(0.85); }

        .app-title { cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: transform 0.2s; }
        .app-title:active { transform: scale(0.96); }
        .app-title h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 800; color: var(--secondary); }
        .app-title p { margin: 0; font-size: 0.75rem; color: var(--text-light); letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }

        /* Search & Chips */
        .search-container { position: relative; width: 100%; margin-bottom: 16px; }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.1rem; }
        .search-input {
            width: 100%; padding: 14px 16px 14px 46px; border-radius: 50px;
            border: 2px solid transparent; background: rgba(0,0,0,0.04);
            font-size: 1rem; transition: 0.3s; color: var(--text-main); font-weight: 500;
        }
        body.dark-mode .search-input { background: rgba(255,255,255,0.05); color: #FFF; }
        .search-input:focus { outline: none; border-color: var(--primary); background: var(--bg-surface); box-shadow: 0 8px 25px rgba(255,153,51,0.2); transform: scale(1.02); }

        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; animation: slideInRight 0.8s ease-out forwards; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .chip {
            border: none; padding: 8px 20px; border-radius: 30px;
            background: rgba(0,0,0,0.06); color: var(--text-light); font-weight: 600; font-size: 0.9rem;
            flex-shrink: 0; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        body.dark-mode .chip { background: rgba(255,255,255,0.08); color: #BBB; }
        .chip.active { background: var(--primary); color: #fff; box-shadow: 0 6px 15px rgba(255, 153, 51, 0.4); transform: translateY(-2px); }

        /* 
           ========================================
           3. MAIN LIST GRID
           ========================================
        */
        .container { max-width: 1200px; margin: 25px auto; padding: 0 15px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .temple-card {
            background: var(--bg-surface); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card); overflow: hidden; display: flex; flex-direction: column;
            position: relative; opacity: 0; transform: translateY(40px) scale(0.95);
            transition: transform 0.4s var(--spring-easing), box-shadow 0.4s;
            border: 1px solid rgba(150,150,150,0.08);
        }
        .temple-card.in-view { animation: springUpCard 0.6s var(--spring-easing) forwards; }
        @keyframes springUpCard { to { opacity: 1; transform: translateY(0) scale(1); } }
        .temple-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-float); border-color: rgba(255,153,51,0.3); }

        /* Thumbnails */
        .thumb-wrapper { position: relative; height: 250px; background-color: #E0E0E0; overflow: hidden; }
        body.dark-mode .thumb-wrapper { background-color: #222; }
        .thumb-scroller { display: flex; height: 100%; width: 100%; overflow-x: auto; scroll-behavior: smooth; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .thumb-scroller::-webkit-scrollbar { display: none; }
        .thumb-slide { flex: 0 0 100%; height: 100%; scroll-snap-align: center; position: relative; overflow: hidden; }
        .thumb-slide img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease-out; }
        .thumb-slide:hover img { transform: scale(1.1); }

        .tap-hint {
            position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.5); color: #fff;
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; pointer-events: none;
            backdrop-filter: blur(8px); z-index: 2; font-weight: 500; border: 1px solid rgba(255,255,255,0.2);
            animation: pulseGlow 2.5s infinite;
        }

        .share-btn-floating {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.9); color: var(--primary-dark);
            border: none; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; cursor: pointer; z-index: 5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(5px); transition: 0.3s var(--spring-easing);
        }
        .share-btn-floating:hover { transform: scale(1.1) rotate(10deg); background: var(--primary); color: white; }
        .share-btn-floating:active { transform: scale(0.85); }

        .view-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.2); 
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; z-index: 3;
        }
        .view-overlay i {
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px);
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.5);
            transform: scale(0.5); transition: 0.4s var(--spring-easing);
        }
        .thumb-slide:hover .view-overlay { opacity: 1; }
        .thumb-slide:hover .view-overlay i { transform: scale(1); }

        /* Card Details */
        .card-details { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; }
        .area-badge { color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 8px; display: inline-flex; align-items: center; gap: 6px; }
        .card-title { margin: 0 0 10px; color: var(--secondary); font-size: 1.4rem; font-weight: 800; line-height: 1.2; font-family: 'Playfair Display', serif;}
        .card-addr { color: var(--text-light); font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; flex-grow: 1; font-weight: 500;}

        /* Buttons */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; }
        .btn {
            border: none; border-radius: 14px; padding: 14px; font-weight: 700; font-size: 0.95rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s; position: relative; overflow: hidden; z-index: 1;
        }
        .btn:active { transform: scale(0.92); }

        .btn-ghost { background: rgba(0,0,0,0.05); color: var(--text-main); border: 1px solid transparent; }
        body.dark-mode .btn-ghost { background: rgba(255,255,255,0.1); color: #FFF; }
        .btn-fill { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; 
            box-shadow: 0 6px 15px rgba(255, 153, 51, 0.3); animation: pulseMap 3s infinite;
        }
        .btn-fill:hover { box-shadow: 0 10px 25px rgba(255, 153, 51, 0.5); transform: translateY(-2px); }
        @keyframes pulseMap { 0% { box-shadow: 0 0 0 0 rgba(255, 153, 51, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(255, 153, 51, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 153, 51, 0); } }

        /* 
           ========================================
           4. FULL SCREEN LIGHTBOX & BOTTOM SHEETS
           ========================================
        */
        .fs-modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.98); backdrop-filter: blur(15px);
            flex-direction: column; opacity: 0; transition: opacity 0.3s;
        }
        .fs-modal.active { display: flex; opacity: 1; }
        .fs-top { position: absolute; top: 0; width: 100%; z-index: 2005; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transform: translateY(-20px); opacity: 0; transition: 0.4s 0.1s; }
        .fs-modal.active .fs-top { transform: translateY(0); opacity: 1; }
        .fs-title { color: white; font-weight: 800; font-size: 1.3rem; font-family: 'Playfair Display', serif;}
        .fs-close { color: white; font-size: 2.2rem; cursor: pointer; transition: 0.3s; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .fs-close:active { transform: scale(0.8); color: var(--primary); }

        .fs-viewport { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .fs-img { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(0.8); opacity: 0; transition: 0.4s var(--spring-easing); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .fs-modal.active .fs-img { transform: scale(1); opacity: 1; }

        .fs-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: 0.2s; z-index: 2010; font-size: 1.2rem; }
        .fs-nav:active { background: var(--primary); transform: translateY(-50%) scale(0.9); border-color: transparent;}
        .fs-prev { left: 20px; } .fs-next { right: 20px; }

        .fs-caption { position: absolute; bottom: 40px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 24px; border-radius: 30px; font-size: 1rem; font-weight: 600; backdrop-filter: blur(10px); left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; transition: 0.4s 0.2s; }
        .fs-modal.active .fs-caption { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Bottom Sheets */
        .share-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 4000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(5px); }
        .share-overlay.active { opacity: 1; pointer-events: auto; }
        .share-sheet { background: var(--bg-surface); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); transition: 0.4s var(--spring-easing); box-shadow: 0 -10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; }
        body.dark-mode .share-sheet { background: #1A1A1A; border-top: 1px solid rgba(255,255,255,0.05); }
        .share-overlay.active .share-sheet { transform: translateY(0); }
        .share-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .share-header h3 { margin: 0; font-size: 1.2rem; color: var(--secondary); font-weight: 800; font-family: 'Playfair Display';}
        .share-close { background: rgba(0,0,0,0.05); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; color: var(--text-main); transition: 0.2s; }
        body.dark-mode .share-close { background: rgba(255,255,255,0.1); color: #fff; }
        .share-close:active { transform: scale(0.85); }

        .sheet-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 1.05rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .sheet-btn:active { transform: scale(0.96); }
        .btn-whatsapp { background: #25D366; color: white; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-native { background: linear-gradient(135deg, var(--primary), #E65100); color: white; box-shadow: 0 4px 15px rgba(255, 153, 51, 0.4); }
        .btn-email { background: #EA4335; color: white; box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3); }
        .btn-copy-sheet { background: rgba(0,0,0,0.06); color: var(--text-main); }
        body.dark-mode .btn-copy-sheet { background: rgba(255,255,255,0.08); color: #FFF; }

        /* Contact Banner */
        .contact-banner { margin-top: 40px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: var(--radius-lg); padding: 24px 30px; display: flex; align-items: center; justify-content: space-between; gap: 20px; color: white; box-shadow: 0 10px 30px rgba(255, 153, 51, 0.3); opacity: 0; transform: translateY(40px) scale(0.95); transition: 0.6s var(--spring-easing); position: relative; overflow: hidden; }
        .contact-banner::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%); animation: spinBg 15s linear infinite; pointer-events: none; }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }
        .contact-banner.in-view { opacity: 1; transform: translateY(0) scale(1); }
        .cb-left { display: flex; align-items: center; gap: 20px; z-index: 1; }
        .cb-icon { font-size: 2.5rem; background: rgba(255,255,255,0.2); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .cb-text h4 { margin: 0 0 4px 0; font-size: 1.3rem; font-weight: 800; }
        .cb-text p { margin: 0; font-size: 0.9rem; font-weight: 500; opacity: 0.9; }
        .btn-cb { background: var(--bg-surface); color: var(--primary-dark); border: none; padding: 14px 28px; border-radius: 30px; font-weight: 800; font-size: 1rem; cursor: pointer; white-space: nowrap; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; z-index: 1; }
        .btn-cb:active { transform: scale(0.92); }

        /* Toast */
        .toast { position: fixed; top: 80px; left: 50%; transform: translate(-50%, -30px); background: rgba(15,15,15,0.95); color: white; padding: 14px 28px; border-radius: 50px; font-size: 0.95rem; font-weight: 600; opacity: 0; transition: 0.4s var(--spring-easing); pointer-events: none; z-index: 5000; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
        
        .empty-msg { text-align: center; color: var(--text-light); margin-top: 80px; font-weight: 600; font-size: 1.2rem; }

        /* Ripple Animation */
        .ripple-effect { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s ease-out; background-color: rgba(255, 255, 255, 0.4); pointer-events: none; }
        .btn-ghost .ripple-effect, .chip .ripple-effect { background-color: rgba(0, 0, 0, 0.1); }
        body.dark-mode .btn-ghost .ripple-effect, body.dark-mode .chip .ripple-effect { background-color: rgba(255, 255, 255, 0.2); }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 768px) {
            .contact-banner { flex-direction: column; text-align: center; padding: 25px 20px; }
            .cb-left { flex-direction: column; gap: 12px; }
            .btn-cb { width: 100%; margin-top: 5px; }
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header>
        <div class="header-top">
            <div class="header-left">
                <!-- Direct Index.html for Web Safety -->
                <button class="btn-nav-back ripple" onclick="window.location.href='index.html'" aria-label="Go Back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                
                <div class="app-title ripple" onclick="window.location.href='index.html'">
                    <h1>Pune Temples</h1>
                    <p><i class="fas fa-home"></i> Tap for App Menu</p>
                </div>
            </div>
            
            <button class="btn-action-icon ripple" onclick="toggleDarkMode()" aria-label="Toggle Theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search Hadapsar, Katraj...">
        </div>

        <div class="filter-scroll" id="filterContainer"></div>
    </header>

    <main class="container">
        <div id="gridTarget" class="grid-layout"></div>
        <div id="emptyState" class="empty-msg" style="display:none">
            <i class="fas fa-om" style="font-size:3rem; margin-bottom:15px; display:block; color:var(--primary);"></i>
            No temples found.
        </div>

        <!-- Contact Banner -->
        <div class="contact-banner" id="contactBannerTarget">
            <div class="cb-left">
                <div class="cb-icon"><i class="fas fa-map-marked-alt"></i></div>
                <div class="cb-text">
                    <h4>Help Us Improve!</h4>
                    <p>Want to add a new ISKCON Temple to the directory?</p>
                </div>
            </div>
            <button class="btn-cb ripple" onclick="openContactSheet()">Contact Admin</button>
        </div>
    </main>

    <!-- Gallery Lightbox -->
    <div id="galleryModal" class="fs-modal">
        <div class="fs-top">
            <span class="fs-title" id="fsTitle">Temple Name</span>
            <div class="fs-close" onclick="closeGallery()"><i class="fas fa-times"></i></div>
        </div>
        <div class="fs-viewport" id="touchSurface">
            <button class="fs-nav fs-prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
            <img id="fsImage" class="fs-img" src="" alt="Full view">
            <button class="fs-nav fs-next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="fs-caption" id="fsCounter">1 / 5</div>
    </div>

    <!-- Share Sheet -->
    <div id="customShareSheet" class="share-overlay" onclick="closeShareSheet()">
        <div class="share-sheet" onclick="event.stopPropagation()">
            <div class="share-header">
                <h3>Share Temple Details</h3>
                <button class="share-close" onclick="closeShareSheet()"><i class="fas fa-times"></i></button>
            </div>
            <!-- Sketchware Native Share Hook -->
            <button class="sheet-btn btn-native ripple" onclick="AppBridge.shareText(currentShareText)">
                <i class="fas fa-share-nodes"></i> Share App / Native Share
            </button>
            <button class="sheet-btn btn-whatsapp ripple" onclick="AppBridge.openWhatsApp(currentShareText)">
                <i class="fab fa-whatsapp"></i> Send via WhatsApp
            </button>
            <button class="sheet-btn btn-copy-sheet ripple" onclick="shareToClipboard()">
                <i class="far fa-copy"></i> Copy Details
            </button>
        </div>
    </div>

    <!-- Contact Admin Sheet -->
    <div id="contactAdminSheet" class="share-overlay" onclick="closeContactSheet()">
        <div class="share-sheet" onclick="event.stopPropagation()">
            <div class="share-header">
                <h3>Contact Administrator</h3>
                <button class="share-close" onclick="closeContactSheet()"><i class="fas fa-times"></i></button>
            </div>
            <p style="margin-top:0; margin-bottom:10px; color:var(--text-light); font-size:0.95rem;">
                Select an option to suggest a temple. We will verify and update the app!
            </p>
            <button class="sheet-btn btn-whatsapp ripple" onclick="AppBridge.openWhatsApp('Hare Krishna Admin! 🙏\n\nI want to suggest an edit / add a new temple to the ISKCON Pune Directory.\n\nDetails:\n')">
                <i class="fab fa-whatsapp"></i> Message on WhatsApp
            </button>
            <button class="sheet-btn btn-email ripple" onclick="AppBridge.sendEmail('Suggestion for ISKCON App', 'Hare Krishna Admin,\n\nI found an incorrect location OR I want to add a new temple.\n\nMy Feedback:\n')">
                <i class="fas fa-envelope"></i> Send an Email
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="appToast">Address Copied!</div>

    <script>
        /* ============================================================
           SKETCHWARE PRO JS BRIDGE (ULTIMATE NATIVE INTEGRATION)
           ============================================================
           To use this in Sketchware:
           1. Add a JavascriptInterface component named "Android" to your WebView.
           2. Create functions in the interface like shareText(String text), etc.
        */
        const AppBridge = {
            shareText: function(text) {
                if (window.Android && typeof window.Android.shareText === "function") {
                    window.Android.shareText(text); // Sketchware Native Share
                    closeShareSheet();
                } else if (navigator.share) {
                    navigator.share({ text: text }).then(closeShareSheet).catch(e => console.log(e));
                } else {
                    shareToClipboard();
                }
            },
            openWhatsApp: function(text) {
                if (window.Android && typeof window.Android.openWhatsApp === "function") {
                    window.Android.openWhatsApp(text); // Sketchware Native WhatsApp Intent
                } else {
                    window.location.href = `https://wa.me/?text=${encodeURIComponent(text)}`;
                }
                closeShareSheet(); closeContactSheet();
            },
            sendEmail: function(subject, body) {
                 if (window.Android && typeof window.Android.sendEmail === "function") {
                     window.Android.sendEmail(subject, body); // Sketchware Native Email Intent
                 } else {
                     window.location.href = `mailto:admin@example.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                 }
                 closeContactSheet();
            },
            openMap: function(query) {
                if (window.Android && typeof window.Android.openMap === "function") {
                    window.Android.openMap(query); // Sketchware Native Map Intent
                } else {
                    window.open(`https://www.google.com/maps/dir/?api=1&destination=${query}`, '_blank');
                }
            }
        };

        const templesData =[
            {
                id: 1, name: "ISKCON Hadapsar", locality: "Hadapsar",
                address: "Survey No 50/11, Purandhare Colony, Pandhari Nagar, Handewadi Rd, Hadapsar, Pune, MH 411028",
                mapUrl: "ISKCON+Hadapsar",
                images:[
                    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj6USIM28qETy1v-VjEwq4AzLg6P13oywxY3vlPRkDOmdcRmyeLqyPKjspUPnv6gUwivhXGpmXUiViRjLw7t_HzCfUQJgE0CJED3VCDhBLOY9pRhSPU4PZ7Tfe1fNxaZcZW850DZuoPdH6ybBxW-rlP3IPk3_9lwBgGRlxcGuyMNBTylyhi9UDBBm6372cj/s1024/1000198175.webp",
                    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhsK9kBQzO7BCgKc_Mydhf4BMguzyXcv9Qe2b32C6RiQWh9ABXp5fe3rxbJrXPvDJS8AWb310MUesu1v6RsACiXE-GOEXa5SdqwGxHkuQqQ2sowmfeccCSu8-9jXoQtUOAmescfeCSYiMKGmGbuJZv3KF1RlwXrhZ8a0X1dpohyfBb3tMXt5yZ5Rk-xrPPT/s1024/1000198172.webp"
                ]
            },
            {
                id: 2, name: "ISKCON NVCC", locality: "Katraj",
                address: "Sr. No. 50, Katraj-Kondhwa Road, Tilekar Nagar, Kondhwa Budruk, Pune, MH 411048",
                mapUrl: "ISKCON+NVCC+Pune",
                images:[
                    "https://iskconpune.com/wp-content/uploads/2019/08/temple-hall-compressor.jpg",
                    "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/ISKCON_Temple_Pune_Night_View.jpg/640px-ISKCON_Temple_Pune_Night_View.jpg"
                ]
            },
            {
                id: 3, name: "Sri Sri Radha Kunjabihari", locality: "Camp",
                address: "4, Tarapore Road, Beside Dastur Boys School, Camp, Pune, MH 411001",
                mapUrl: "ISKCON+Camp+Pune",
                images:[ "https://tse3.mm.bing.net/th?id=OIP.hF8g24sJTy0xIiy_Ggw1yAHaFj&pid=Api" ]
            },
            {
                id: 4, name: "ISKCON Pimpri Chinchwad", locality: "Ravet",
                address: "Sr. No. 4, H. No 4/1, Near Mansarovar Hotel, Ravet, Pimpri-Chinchwad, Pune",
                mapUrl: "ISKCON+Pimpri+Chinchwad",
                images:[ "https://live.staticflickr.com/4054/4514578964_60e67e3518_b.jpg" ]
            }
        ];

        let currentState = { filter: 'All', search: '', galleryOpen: false, currentTempleId: null, imgIndex: 0 };
        let currentShareText = "";

        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('in-view'); scrollObserver.unobserve(entry.target); }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        document.addEventListener('DOMContentLoaded', () => {
            renderFilterChips(); renderTemples(); setupTouchGestures();
            scrollObserver.observe(document.getElementById('contactBannerTarget'));
            
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
            }
            
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                currentState.search = e.target.value.toLowerCase().trim(); renderTemples();
            });
        });

        function renderFilterChips() {
            const chipContainer = document.getElementById('filterContainer');
            const uniqueAreas =['All', ...new Set(templesData.map(t => t.locality))];
            chipContainer.innerHTML = uniqueAreas.map(area => `<button class="chip ripple ${area === 'All' ? 'active' : ''}" onclick="setFilter(this, '${area}')">${area}</button>`).join('');
            applyRippleEffect();
        }

        function setFilter(el, area) {
            currentState.filter = area;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); renderTemples();
        }

        function renderTemples() {
            const grid = document.getElementById('gridTarget');
            const empty = document.getElementById('emptyState');
            
            const filtered = templesData.filter(t => {
                const matchArea = currentState.filter === 'All' || t.locality === currentState.filter;
                const matchSearch = t.name.toLowerCase().includes(currentState.search) || t.locality.toLowerCase().includes(currentState.search) || t.address.toLowerCase().includes(currentState.search);
                return matchArea && matchSearch;
            });

            if(filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; } 
            else { empty.style.display = 'none'; }

            grid.innerHTML = filtered.map((temple) => {
                const thumbSlides = temple.images.map((img, i) => `
                    <div class="thumb-slide" onclick="openGallery(${temple.id}, ${i})">
                        <div class="view-overlay"><i class="fas fa-search-plus"></i></div>
                        <img src="${img}" loading="lazy" alt="${temple.name}">
                    </div>
                `).join('');

                return `
                <article class="temple-card">
                    <div class="thumb-wrapper">
                        <button class="share-btn-floating ripple" onclick="event.stopPropagation(); triggerShare('${temple.name.replace(/'/g, "\\'")}', '${temple.address.replace(/'/g, "\\'")}', '${temple.mapUrl}')" aria-label="Share">
                            <i class="fas fa-share-alt"></i>
                        </button>
                        <div class="thumb-scroller">${thumbSlides}</div>
                        <span class="tap-hint"><i class="fas fa-expand"></i> Expand</span>
                    </div>
                    <div class="card-details">
                        <span class="area-badge"><i class="fas fa-map-marker-alt"></i> ${temple.locality}</span>
                        <h3 class="card-title">${temple.name}</h3>
                        <p class="card-addr">${temple.address}</p>
                        <div class="action-row">
                            <button class="btn btn-ghost ripple" onclick="copyAddress('${temple.address.replace(/'/g, "\\'")}')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-fill ripple" onclick="AppBridge.openMap('${temple.mapUrl}')"><i class="fas fa-directions"></i> Map</button>
                        </div>
                    </div>
                </article>`;
            }).join('');
            
            document.querySelectorAll('.temple-card').forEach(card => scrollObserver.observe(card));
            applyRippleEffect(); 
        }

        function openGallery(templeId, index) {
            currentState.currentTempleId = templeId; currentState.imgIndex = index; currentState.galleryOpen = true;
            document.getElementById('fsTitle').textContent = templesData.find(t => t.id === templeId).name;
            updateGalleryImage(); document.getElementById('galleryModal').classList.add('active');
        }

        function closeGallery() { document.getElementById('galleryModal').classList.remove('active'); currentState.galleryOpen = false; }

        function moveSlide(step) {
            const total = templesData.find(t => t.id === currentState.currentTempleId).images.length;
            currentState.imgIndex = (currentState.imgIndex + step + total) % total;
            updateGalleryImage();
        }

        function updateGalleryImage() {
            const temple = templesData.find(t => t.id === currentState.currentTempleId);
            const imgEl = document.getElementById('fsImage');
            imgEl.style.opacity = '0'; imgEl.style.transform = 'scale(0.8)';
            setTimeout(() => {
                imgEl.src = temple.images[currentState.imgIndex];
                imgEl.onload = () => { imgEl.style.opacity = '1'; imgEl.style.transform = 'scale(1)'; };
            }, 50);
            document.getElementById('fsCounter').textContent = `${currentState.imgIndex + 1} / ${temple.images.length}`;
        }

        function setupTouchGestures() {
            let startX = 0;
            document.getElementById('touchSurface').addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive: true});
            document.getElementById('touchSurface').addEventListener('touchend', e => {
                if (!currentState.galleryOpen) return;
                const endX = e.changedTouches[0].screenX;
                if (endX < startX - 50) moveSlide(1); 
                if (endX > startX + 50) moveSlide(-1); 
            }, {passive: true});
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.classList.replace(document.body.classList.contains('dark-mode')?'fa-moon':'fa-sun', document.body.classList.contains('dark-mode')?'fa-sun':'fa-moon');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light');
        }

        function triggerShare(name, address, mapUrl) {
            currentShareText = `Jai Shri Krishna! ✨\n\nCheck out ${name} in Pune.\n📍 Address: ${address}\n\n🗺️ Map: https://www.google.com/maps/dir/?api=1&destination=${mapUrl}`;
            document.getElementById('customShareSheet').classList.add('active');
        }

        function closeShareSheet() { document.getElementById('customShareSheet').classList.remove('active'); }
        function openContactSheet() { document.getElementById('contactAdminSheet').classList.add('active'); }
        function closeContactSheet() { document.getElementById('contactAdminSheet').classList.remove('active'); }

        function shareToClipboard() { copyAddress(currentShareText); closeShareSheet(); }

        function copyAddress(text) {
            const toast = document.getElementById('appToast');
            toast.innerHTML = `<i class="fas fa-check-circle" style="color:#FF9933; margin-right:8px;"></i> Copied to Clipboard!`;
            if (navigator.clipboard) navigator.clipboard.writeText(text);
            else { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function applyRippleEffect() {
            document.querySelectorAll('.ripple').forEach(btn => {
                btn.addEventListener('click', e => {
                    const circle = document.createElement("span");
                    const d = Math.max(btn.clientWidth, btn.clientHeight);
                    circle.style.width = circle.style.height = `${d}px`;
                    circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - d/2}px`;
                    circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - d/2}px`;
                    circle.classList.add("ripple-effect");
                    const old = btn.querySelector('.ripple-effect'); if(old) old.remove();
                    btn.appendChild(circle);
                });
            });
        }
    </script>
</body>
</html>
